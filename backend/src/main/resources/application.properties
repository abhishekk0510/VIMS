# ============================================================
# VIMS - application.properties (dev)
# ============================================================

spring.application.name=vims-backend

# Server
server.port=8080
server.servlet.context-path=/api

# Hide internal stack traces from responses (VAPT fix)
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vimsdb}
spring.datasource.username=${DB_USERNAME:vims_user}
spring.datasource.password=${DB_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-secret-256bit}
# 8 hours access token
jwt.expiration.ms=28800000
# 7 day refresh token
jwt.refresh.expiration.ms=604800000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.allowed-types=application/pdf,image/jpeg,image/png,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet

# Storage backend: 'local' uses the filesystem (dev only), 'cloudinary' uploads to Cloudinary (production)
# Set STORAGE_TYPE=cloudinary in Railway env vars when deploying
file.storage.type=${STORAGE_TYPE:local}
file.upload.dir=${UPLOAD_DIR:./uploads}

# Cloudinary (required when STORAGE_TYPE=cloudinary)
# Set these in Railway: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@vims.com}

# Free AI â HuggingFace Inference API
# Sign up at https://huggingface.co/ for a free API key
ai.provider=huggingface
ai.huggingface.api-url=https://api-inference.huggingface.co/models
ai.huggingface.token=${HF_TOKEN:}
# Free model for invoice analysis
ai.huggingface.model=microsoft/DialoGPT-medium
# For anomaly / classification
ai.huggingface.classifier-model=facebook/bart-large-mnli

# CORS — set CORS_ORIGINS to your Vercel URL in Railway env vars
# e.g. CORS_ORIGINS=https://your-app.vercel.app
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3001}

# Rate Limiting
rate.limit.login.capacity=10
rate.limit.login.refill-per-minute=10
rate.limit.api.capacity=200
rate.limit.api.refill-per-minute=100

# Security Headers
security.headers.hsts=true
security.headers.xframe-options=DENY
security.headers.xcontent-type-options=true

# Logging
logging.level.com.vims=INFO
logging.level.org.springframework.security=WARN

# Actuator - disable mail health check (mail is optional)
management.health.mail.enabled=false
