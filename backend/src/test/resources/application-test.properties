spring.datasource.url=jdbc:h2:mem:vimstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

jwt.secret=test-jwt-secret-key-for-unit-tests-only
jwt.expiration.ms=3600000
jwt.refresh.expiration.ms=86400000

file.storage.type=local
file.upload.dir=/tmp/vims-test-uploads
file.allowed-types=application/pdf,image/jpeg,image/png

cors.allowed-origins=http://localhost:3001
spring.mail.host=localhost
management.health.mail.enabled=false

# Suppress AI and OCR calls in tests
ai.huggingface.token=
